# Server Configuration
server.port=8080

# --- H2 Database Configuration (Local Development) ---
spring.datasource.url=jdbc:h2:mem:AUTONOMA;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
