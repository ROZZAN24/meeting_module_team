# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT Configuration (Secret should be at least 256 bits)
jwt.secret=9a4f2c8d3e1f5b7a6c9d8e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger / OpenAPI Configuration
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

server.error.include-message=always

# ==============================|| LOGGING CONFIGURATION ||==============================

# Suppress routine Hibernate SQL query output (SELECT / INSERT / UPDATE / DELETE)
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# Keep SQL ERRORS visible (missing column, missing table, constraint violations, etc.)
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=WARN

# Keep JPA / Spring Data errors visible
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.dao=WARN

# Keep Spring MVC exception resolver visible (shows resolved exceptions per endpoint)
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=WARN

# Keep all application-level Java exceptions visible
logging.level.org.springframework=WARN
logging.level.com.nutech=INFO
